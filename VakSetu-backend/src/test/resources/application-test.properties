spring.application.name=VakSetu

spring.datasource.url=jdbc:h2:mem:vaksetu_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

jwt.secret=VakSetuTestSecretKeyForJwtAuthenticationMustBeLongerThanSixtyFourCharacters123456789
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=2592000000
